name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping homepage (hits DB)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://frontend-eight-alpha-17.vercel.app/"
      
      - name: Ping categories API (hits DB)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://frontend-eight-alpha-17.vercel.app/api/public/categories"
      
      - name: Ping a product page (hits DB)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://frontend-eight-alpha-17.vercel.app/producto/vestido-floral-primavera"
